<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gorditos Swing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #121212;
    margin: 0;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px 15px;
    background: #7a0f14; /* rojo más suave */
    border-bottom: 3px solid #f5c518;
}

header img {
    width: 110px;
    border-radius: 50%;
    margin-bottom: 10px;
}

header h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 1px;
}

/* CONTENEDOR */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* TARJETAS */
.card {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    border: 1px solid #2c2c2c;
}

/* FORMULARIO */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
}

input, select {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2a2a2a;
    color: white;
}

/* BOTONES */
button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #f5c518;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #ffd84d;
}

.delete {
    background: #b02a2a;
    color: white;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #7a0f14;
    padding: 12px;
}

td {
    padding: 10px;
    text-align: center;
}

tr:nth-child(even) {
    background: #262626;
}

/* RESUMEN */
.resumen {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.box {
    background: #181818;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.ing { border-left: 5px solid #4caf50; }
.egr { border-left: 5px solid #e53935; }
.gan { border-left: 5px solid #f5c518; }

</style>
</head>

<body>

<header>
    <img src="logo.png">
    <h1>Gorditos Swing</h1>
</header>

<div class="container">

<!-- FORMULARIO -->
<div class="card">
<h3>Agregar movimiento</h3>

<div class="form-grid">
<input type="date" id="fecha">
<select id="tipo">
<option value="Ingreso">Ingreso</option>
<option value="Egreso">Egreso</option>
</select>

<input type="text" id="categoria" placeholder="Categoría">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="number" id="monto" placeholder="Monto">
<button onclick="agregar()">Agregar</button>
</div>
</div>

<!-- FILTRO -->
<div class="card">
<h3>Filtrar por mes</h3>
<input type="month" id="filtroMes" onchange="mostrar()">
</div>

<!-- TABLA -->
<div class="card">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Categoría</th>
<th>Descripción</th>
<th>Monto</th>
<th>🗑️</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- RESUMEN -->
<div class="resumen">
<div class="box ing">
<h3>Ingresos</h3>
<p id="ingresos">$0</p>
</div>

<div class="box egr">
<h3>Egresos</h3>
<p id="egresos">$0</p>
</div>

<div class="box gan">
<h3>Ganancia</h3>
<p id="ganancia">$0</p>
</div>
</div>

<!-- EXPORTAR -->
<div class="card" style="text-align:center;">
<button onclick="exportar()">Exportar a Excel</button>
</div>

</div>

<script>
let datos = JSON.parse(localStorage.getItem("gorditosSwing")) || [];

function guardar() {
    localStorage.setItem("gorditosSwing", JSON.stringify(datos));
}

function agregar() {
    let fecha = document.getElementById("fecha").value;
    let tipo = document.getElementById("tipo").value;
    let categoria = document.getElementById("categoria").value;
    let descripcion = document.getElementById("descripcion").value;
    let monto = parseFloat(document.getElementById("monto").value);

    if (!fecha || !monto) return alert("Faltan datos");

    datos.push({fecha, tipo, categoria, descripcion, monto});
    guardar();
    limpiar();
    mostrar();
}

function limpiar() {
    document.getElementById("categoria").value="";
    document.getElementById("descripcion").value="";
    document.getElementById("monto").value="";
}

function eliminar(i) {
    datos.splice(i,1);
    guardar();
    mostrar();
}

function mostrar() {
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    let filtro = document.getElementById("filtroMes").value;

    let ingresos = 0;
    let egresos = 0;

    datos.forEach((d,i)=>{
        if (filtro && !d.fecha.startsWith(filtro)) return;

        let fila = `<tr>
        <td>${d.fecha}</td>
        <td>${d.tipo}</td>
        <td>${d.categoria}</td>
        <td>${d.descripcion}</td>
        <td>$${d.monto.toFixed(2)}</td>
        <td><button class="delete" onclick="eliminar(${i})">🗑️</button></td>
        </tr>`;

        tabla.innerHTML += fila;

        if (d.tipo==="Ingreso") ingresos += d.monto;
        else egresos += d.monto;
    });

    document.getElementById("ingresos").innerText = "$" + ingresos.toFixed(2);
    document.getElementById("egresos").innerText = "$" + egresos.toFixed(2);
    document.getElementById("ganancia").innerText = "$" + (ingresos-egresos).toFixed(2);
}

function exportar() {
    let csv = "Fecha,Tipo,Categoria,Descripcion,Monto\n";
    datos.forEach(d=>{
        csv += `${d.fecha},${d.tipo},${d.categoria},${d.descripcion},${d.monto}\n`;
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "gorditos_swing.csv";
    a.click();
}

mostrar();
</script>

</body>
</html>
